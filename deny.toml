[graph]
all-features = true

[advisories]
ignore = [
    "RUSTSEC-2021-0127", # serde_cbor is unmaintained
    "RUSTSEC-2024-0436", # paste - no longer maintained
    # Build-time-only transitive dependency of validator_derive 0.20.0. The
    # advisory has no maintained compatible release yet; remove this exception
    # as soon as validator publishes a replacement.
    "RUSTSEC-2026-0173",
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    # "MPL-2.0",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
]
exceptions = [{ allow = ["Zlib"], crate = "foldhash" }]
private = { ignore = true }
